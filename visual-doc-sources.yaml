# =============================================================================
# visual-doc-sources.yaml — スキーマ（このブロックが仕様の正）
# =============================================================================
# 文字エンコーディング: UTF-8。インデント: スペース 2。
#
# 【トップレベル】
#   version (必須, 整数)
#     マニフェスト形式の互換性バージョン。スキーマや必須キーが変わったら上げる。
#   sources (必須, 配列)
#     ビジュアル資料の元リポジトリと生成物の対応一覧。各要素は「source エントリ」。
#
# 【source エントリ — 必須キー】
#   id (文字列)
#     エントリの安定 ID。スラッグ（英小文字・ハイフン推奨）。スクリプトのキーに使う。
#     sources 配列内では一意にすること（重複 id は不可）。
#   name (文字列)
#     人間向けの表示名。
#   repo_url (文字列)
#     git clone の元 URL（HTTPS または SSH）。秘密値は書かない。
#   local_path (文字列)
#     ワークスペース内の相対パス。クローン先。通常 `repos/<名前>`（`repos/` 配下を前提）。
#   output_html (文字列)
#     このサイトで公開する生成 HTML の相対パス（例: `docs/foo.html`）。
#   index_linked (真偽)
#     `index.html` の `.doc-list` にリンクを載せるか。
#     現状は手動追記と二重管理になるため、変更時は index.html 側と必ず揃える。
#
# 【source エントリ — 任意キー】
#   tags (文字列の配列)
#     分類・検索用ラベル。
#   status (文字列)
#     ライフサイクル。想定値の例: active（運用中）, stale（更新停滞）, planned（未着手・予定）。
#     列挙は固定ではなく、運用で拡張可。未知の値はスクリプトが無視してよい。
#   notes (文字列)
#     一行メモ（人間・レビュー用）。長文は別ドキュメントへ。
#   clone_depth (整数 または null)
#     浅い clone の深さ。`null` は「指定なし・デフォルトに任せる」。
#   default_branch (文字列)
#     追跡する既定ブランチ名（例: main）。clone スクリプトが参照。
#
# 【将来、トップレベルに追加しうる予約名（未使用の間は書かない）】
#   metadata, defaults, policies — サイト全体のメタ・既定・ポリシー用として予約。
#   新キーを足すときは version を上げ、ここに意味を追記すること。
# =============================================================================

